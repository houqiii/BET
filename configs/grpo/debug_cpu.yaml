model:
  name_or_path: /path/to/small-debug-model

data:
  train_file: examples/grpo/mini_math_train.jsonl

training:
  output_dir: outputs/debug_grpo
  learning_rate: 1.0e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 1
  num_generations: 2
  max_completion_length: 512
  temperature: 0.7
  bf16: false
  logging_steps: 1
  report_to: none

reward:
  max_completion_tokens: 512
  efficient_cost_percentile: 0.30
