model:
  name_or_path: outputs/qwen3_4b_bet_sft/final
  attn_implementation: sdpa

data:
  train_file: examples/grpo/mini_math_train.jsonl

training:
  output_dir: outputs/qwen3_4b_bet_grpo
  learning_rate: 1.0e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  num_generations: 16
  generation_batch_size: 64
  max_completion_length: 16384
  temperature: 0.8
  top_p: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 100
  report_to: none
  seed: 42

reward:
  max_completion_tokens: 16384
  efficient_cost_percentile: 0.30
  delta: 0.10
  lambda_abstain: 0.80
  beta: 0.30
  tau: 0.25
  gamma_d: 0.10
  gamma_b_under: 0.20
  gamma_b_over: 0.10
  gamma_d_unsolvable: 0.40
  gamma_b_unsolvable: 0.40
  include_format_reward: true
