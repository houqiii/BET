model:
  name_or_path: outputs/qwen3_4b_bet_sft/final
  attn_implementation: sdpa

data:
  train_file: examples/grpo/mini_math_train.jsonl

training:
  output_dir: outputs/qwen3_4b_bet_grpo
  learning_rate: 1.0e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 32
  num_generations: 16
  generation_batch_size: 64
  max_completion_length: 16384
  temperature: 0.8
  top_p: 1.0
  bf16: true
  logging_steps: 5
  save_steps: 100
  report_to: none
  seed: 42

# Reward hyperparameters matching Table 6 (Appendix A.4)
reward:
  max_completion_tokens: 16384
  efficient_cost_percentile: 0.30
  # R_VAL (Eq. 4)
  delta: 0.10
  lambda_abstain: 0.80
  alpha_fail: 0.20
  # R_EFF (Eq. 5)
  beta: 0.30
  tau: 0.25
  # R_CAL (Eq. 6)
  gamma_s: 0.10
  gamma_b: 0.20
  gamma_s_unsolvable: 0.20
  gamma_b_unsolvable: 0.10
  mu: 2.0
  include_format_reward: true
